read_write_boolean:

read_only_boolean:

  ## Eingänge

  hot_water_thermostat:
    title: Warmwasserthermostat
    address: 3
    bits: 1
    map:
      0: "Inaktiv"
      1: "Anforderung"
    icon: mdi:thermostat

  utility_block:
    title: EVU-Sperre
    address: 5
    bits: 1
    map:
      0: "Freigegeben"
      1: "Gesperrt"
    icon: mdi:eye-lock

  external_block:
    title: Sperre Extern
    address: 6
    bits: 1
    map:
      0: "Freigegeben"
      1: "Gesperrt"
    icon: mdi:eye-lock

  ## Ausgänge

  compressor1:
    title: Verdichter 1 Modus
    address: 41
