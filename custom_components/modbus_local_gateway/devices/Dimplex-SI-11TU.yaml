device:
  manufacturer: Dimplex
  model: Dimplex Sole/Wasser-Wärmepumpe SI 11TU
  max_register_read: 10


read_write_word:

  operating_mode:
    title: Betriebsmodus
    address: 5015
    control: select
    options:
      0: Sommer
      1: Auto
      2: Urlaub
      3: Party
      4: 2.Wärmeerzeuger
      5: Kühlen
    icon: mdi:cog

  # 1. Heizkreis

  heating_parallel_shift:
    title: Heizung Parallelverschiebung
    address: 5036
    control: select
    options:
      0: "-19 °C"
      1: "-18 °C"
      2: "-17 °C"
      3: "-16 °C"
      4: "-15 °C"
      5: "-14 °C"
      6: "-13 °C"
      7: "-12 °C"
      8: "-11 °C"
      9: "-10 °C"
      10: "-9 °C"
      11: "-8 °C"
      12: "-7 °C"
      13: "-6 °C"
      14: "-5 °C"
      15: "-4 °C"
      16: "-3 °C"
      17: "-2 °C"
      18: "-1 °C"
      19: "0 °C"
      20: "1 °C"
      21: "2 °C"
      22: "3 °C"
      23: "4 °C"
      24: "5 °C"
      25: "6 °C"
      26: "7 °C"
      27: "8 °C"
      28: "9 °C"
      29: "10 °C"
      30: "11 °C"
      31: "12 °C"
      32: "13 °C"
      33: "14 °C"
      34: "15 °C"
      35: "16 °C"
      36: "17 °C"
      37: "18 °C"
      38: "19 °C"
    icon: mdi:home-thermometer-outline

  heating_room_temperature:
    title: Heizung Raumtemperatur
    address: 46
    precision: 0
    control: number
    number:
      min: 15
      max: 30
    unit_of_measurement: °C
    icon: mdi:home-thermometer-outline

  heating_fixed_target:
    title: Heizung Festwertsolltemperatur
    address: 5037
    precision: 0
    control: number
    number:
      min: 18
      max: 60
    unit_of_measurement: °C
    icon: mdi:home-thermometer

  heating_curve_end_point:
    title: Heizung Heizkurvenendpunkt
    address: 5038
    precision: 0
    control: number
    number:
      min: 20
      max: 70
    unit_of_measurement: °C
    icon: mdi:home-thermometer-outline

  heating_hysteresis:
    title: Heizung Hysterese
    address: 47
    precision: 1
    multiplier: 0.1
    control: number
    number:
      min: 0.5
      max: 5.0
    unit_of_measurement: K
    icon: mdi:home-thermometer-outline

  external_block_software:
    title: Softwaresperre Extern
    address: 5130
    control: select
    options:
      0: Hardwareeingang
      10: Sperre nicht aktiv
      11: Sperre aktiv
    icon: mdi:lock

  # Warmwasser

  hot_water_hysteresis:
    title: Warmwasser Hysterese
    address: 5045
    precision: 0
    control: number
    number:
      min: 2
      max: 15
    unit_of_measurement: K
    icon: mdi:water-thermometer-outline

  hot_water_fixed_target:
    title: Warmwasser Festwertsolltemperatur
    address: 5047
    precision: 0
    control: number
    number:
      min: 18
      max: 60
    unit_of_measurement: °C
    icon: mdi:water-thermometer

  hot_water_min_fixed_target:
    title: Warmwasser Solltemperatur Minimal
    address: 5145
    precision: 0
    control: number
    number:
      min: 10
      max: 60
    unit_of_measurement: °C
    icon: mdi:water-thermometer-outline

  hot_water_max_fixed_target:
    title: Warmwasser Solltemperatur Maximal
    address: 5048
    precision: 0
    control: number
    number:
      min: 10
      max: 60
    unit_of_measurement: °C
    icon: mdi:water-thermometer-outline

read_only_word:

  # Betriebsdaten / Operating Data

  outside_temp:
    title: Außentemperatur (R1)
    address: 1
    precision: 1
    multiplier: 0.1
    unit_of_measurement: °C
    icon: mdi:thermometer

  heating_return_temp:
    title: Heizung Rücklauftemperatur (R2)
    address: 2
    precision: 1
    multiplier: 0.1
    unit_of_measurement: °C
    icon: mdi:thermometer

  heating_return_target:
    title: Heizung Rücklaufsolltemperatur
    address: 53
    precision: 1
    multiplier: 0.1
    unit_of_measurement: °C
    icon: mdi:thermometer

  hot_water_temp:
    title: Warmwasser Temperatur (R3)
    address: 3
    precision: 1
    multiplier: 0.1
    unit_of_measurement: °C
    icon: mdi:thermometer

  hot_water_target:
    title: Warmwasser Solltemperatur
    address: 58
    precision: 1
    multiplier: 0.1
    unit_of_measurement: °C
    icon: mdi:thermometer

  flow_temp:
    title: Vorlauftemperatur (R9)
    address: 5
    precision: 1
    multiplier: 0.1
    unit_of_measurement: °C
    icon: mdi:thermometer

  source_input_temp:
    title: Wärmequelleneintrittstemperatur (R24)
    address: 6
    precision: 1
    multiplier: 0.1
    unit_of_measurement: °C
    icon: mdi:thermometer

  source_output_temp:
    title: Wärmequellenaustrittstemperatur (R6)
    address: 7
    precision: 1
    multiplier: 0.1
    unit_of_measurement: °C
    icon: mdi:thermometer

  # Operating Hours

  compressor1_hours:
    title: Verdichter 1 Laufzeit
    address: 72
    precision: 0
    never_resets: True
    state_class: total_increasing
    unit_of_measurement: h
    icon: mdi:history

  primary_pump_hours:
    title: Primärpumpe / Ventilator (M11) Laufzeit
    address: 74
    precision: 0
    never_resets: True
    state_class: total_increasing
    unit_of_measurement: h
    icon: mdi:history

  heating_pump_hours:
    title: Heizungspumpe (M13) Laufzeit
    address: 76
    precision: 0
    never_resets: True
    state_class: total_increasing
    unit_of_measurement: h
    icon: mdi:history

  hot_water_pump_hours:
    title: Warmwasserpumpe (M18) Laufzeit
    address: 77
    precision: 0
    never_resets: True
    state_class: total_increasing
    unit_of_measurement: h
    icon: mdi:history

  additional_pump_hours:
    title: Zusatzumwälzpumpe (M16) Laufzeit
    address: 71
    precision: 0
    never_resets: True
    state_class: total_increasing
    unit_of_measurement: h
    icon: mdi:history

  # Energy Measurements

  heating_energy:
    title: Wärmemenge Heizung
    address: 5096
    precision: 0
    size: 3
    sum_scale: [1, 10000, 100000000] # TODO: implement this
    never_resets: True
    state_class: total_increasing
    unit_of_measurement: kWh
    icon: mdi:meter-electric

  hot_water_energy:
    title: Wärmemenge Warmwasser
    address: 5099
    precision: 0
    size: 3
    sum_scale: [1, 10000, 100000000] # TODO: implement this
    never_resets: True
    state_class: total_increasing
    unit_of_measurement: kWh
    icon: mdi:meter-electric

  # Status Messages

  operation_status:
    title: Statusmeldung
    address: 103
    map:
      0: "Aus"
      1: "Aus"
      2: "Heizen"
      3: "Schwimmbad"
      4: "Warmwasser"
      5: "Kühlen"
      10: "Abtauen"
      11: "Durchflussüberwachung"
      24: "Verzögerung Betriebsmodusumschaltung"
      30: "Sperre"
    icon: mdi:message-processing

  blocking_status:
