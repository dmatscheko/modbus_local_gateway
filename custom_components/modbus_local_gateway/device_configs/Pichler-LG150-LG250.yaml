    icon: mdi:thermometer

  luftfeuchtigkeit_maximum_number:
    name: Luftfeuchtigkeit Maximum
    address: 45
    control: number
    number:
      min: 0
      max: 100
      step: 1
    unit_of_measurement: "%"
    device_class: humidity
    icon: mdi:thermometer
